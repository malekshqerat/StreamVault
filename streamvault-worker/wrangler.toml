name = "streamvault-worker"
main = "src/index.js"
compatibility_date = "2024-12-01"

# KV namespace for Stalker session/path caching
[[kv_namespaces]]
binding = "SV_CACHE"
id = "852bb8a28504423e867886eac35fde3e"

# D1 database for persistent content storage
[[d1_databases]]
binding = "SV_DB"
database_name = "streamvault-db"
database_id = "aa169664-7ce3-45f1-b1f1-ff4cdcfa292f"
migrations_dir = "migrations"

# Daily cleanup: purge data for guests inactive > 7 days (runs at 3am UTC)
[triggers]
crons = ["0 3 * * *"]
